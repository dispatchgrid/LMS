<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Floating SVG Background</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0d0d1a;
            /* dark background */
            color: #f8f9fa;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        svg {
            position: absolute;
            bottom: -100px;
            opacity: 0.7;
            filter: blur(0px);
        }

        @keyframes floatUp {
            
            0%{
                transform: translateY(0);
                opacity: 0;
            }
            10%{
                opacity: 0.7;
            }
            100%{
                transform: translateY(-100vh);
                opacity: 0.2;
            }
        }

    </style>
</head>

    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Error</span>
            <div>
   
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>

        </div>
    </nav>

    <div class="content">
        <h1>Floating SVG Background</h1>
        <p>Books, pencils, and more drifting upward.</p>

        const palette = ["#2F2FE4", "#4A4AE8", "#1C1CBF", "#2A2A5A", "#12122B"];

        function createShape() {
            const svgWrapper = document.createElement("div");
            svgWrapper.innerHTML = svgs[Math.floor(Math.random() * svgs.length)];
            const svg = svgWrapper.firstChild;

            // Random size
            const size = Math.floor(Math.random() * 50) + 30;
            svg.setAttribute("width", size);
            svg.setAttribute("height", size);

            // Random horizontal position
            svg.style.left = Math.random() * 100 + "%";

            // Random vertical start position
            const startY = Math.floor(Math.random() * window.innerHeight * 0.5);
            svg.style.bottom = `${startY}px`;

            // Random animation speed
            const duration = Math.floor(Math.random() * 20) + 15; // 15–35s
            svg.style.animation = `floatUp ${duration}s linear infinite`;

            // Random blur
            const blur = Math.floor(Math.random() * 4); // 0–3px
            svg.style.filter = `blur(${blur}px)`;

            // Apply palette color
            const color = palette[Math.floor(Math.random() * palette.length)];
            svg.style.fill = color;
            svg.style.stroke = color;

            container.appendChild(svg);
        }

        // Generate multiple shapes
        for (let i = 0; i < 50; i++) {
            createShape();
        }
