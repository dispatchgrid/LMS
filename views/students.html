<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

 <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Error</span>
            <div>
   
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>

        </div>
    </nav>


  <div class="container-fluid my-4">
    <div class="row">

      <!-- Left Side: Form -->
      <div class="col-md-4">
        <div class="card bg-secondary text-light p-3">
          <h4 class="mb-3">Add / Edit Student</h4>
          <form id="studentForm">
            <div class="mb-3">
              <label for="admission_no" class="form-label">Admission No</label>
              <input type="number" id="admission_no" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="class" class="form-label">Class</label>
              <input type="text" id="class" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" id="name" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Save Student</button>
          </form>
        </div>
      </div>

      <!-- Right Side: Table -->
      <div class="col-md-8">
        <div class="card bg-secondary text-light p-3">
          <h4 class="mb-3">Student Records</h4>
          <div class="input-group mb-3">
            <input type="text" id="searchInput" class="form-control" placeholder="Search by ID or Name">
            <button class="btn btn-dark" onclick="searchStudent()">Search</button>
          </div>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Admission No</th>
                <th>Class</th>
                <th>Name</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentTable">
              <!-- Student rows will be inserted here -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Load all students
    function loadStudents() {
      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: "SELECT * FROM Students" })
      })
      .then(res => res.json())
      .then(data => renderTable(data));
    }

    // Save student (insert or update)
    document.getElementById("studentForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const admission_no = document.getElementById("admission_no").value;
      const studentClass = document.getElementById("class").value;
      const name = document.getElementById("name").value;

      const sql = `
        INSERT INTO Students (admission_no, class, name)
        VALUES (${admission_no}, '${studentClass}', '${name}')
        ON DUPLICATE KEY UPDATE class='${studentClass}', name='${name}'
      `;

      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: sql })
      })
      .then(() => loadStudents());

      this.reset();
    });

    // Delete student
    function deleteStudent(id) {
      const sql = `DELETE FROM Students WHERE admission_no=${id}`;
      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: sql })
      })
      .then(() => loadStudents());
    }

    // Search student
    function searchStudent() {
      const query = document.getElementById("searchInput").value;
      const sql = `SELECT * FROM Students WHERE admission_no='${query}' OR name LIKE '%${query}%'`;

      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: sql })
      })
      .then(res => res.json())
      .then(data => renderTable(data));
    }

    // Render table
    function renderTable(students) {
      const tbody = document.getElementById("studentTable");
      tbody.innerHTML = "";
      students.forEach(s => {
        tbody.innerHTML += `
          <tr>
            <td>${s.admission_no}</td>
            <td>${s.class}</td>
            <td>${s.name}</td>
            <td>
              <button class="btn btn-sm btn-light" onclick="editStudent('${s.admission_no}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteStudent('${s.admission_no}')">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    // Edit student (prefill form)
    function editStudent(id) {
      const sql = `SELECT * FROM Students WHERE admission_no=${id}`;
      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: sql })
      })
      .then(res => res.json())
      .then(data => {
        if (data.length > 0) {
          const s = data[0];
          document.getElementById("admission_no").value = s.admission_no;
          document.getElementById("class").value = s.class;
          document.getElementById("name").value = s.name;
        }
      });
    }

    // Initial load
    loadStudents();
  </script>

</body>
</html>
