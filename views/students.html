<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Error</span>
            <div>

                <div id="navbarContent"></div>
            </div>

        </div>
    </nav>


    <div class="container-fluid my-4">
        <div class="row">

            <!-- Left Side: Form -->
            <div class="col-md-4">
                <div class="card bg-secondary text-light p-3">
                    <h4 class="mb-3">Add / Edit Student</h4>
                    <form id="studentForm">
                        <div class="mb-3">
                            <label for="admission_no" class="form-label">Admission No</label>
                            <input type="number" id="admission_no" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="class" class="form-label">Class</label>
                            <input type="text" id="class" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="class_number" class="form-label">Class Number</label>
                            <input type="number" id="class_number" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save Student</button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Table -->
            <div class="col-md-8">
                <div class="card bg-secondary text-light p-3">
                    <h4 class="mb-3">Student Records</h4>
                    <div class="input-group mb-3">
                        <input type="text" id="searchInput" class="form-control"
                            placeholder="Search by ID, Name or Class + Class number">
                        <button class="btn btn-primary" onclick="searchStudent()">Search</button>
                    </div>
                    <div style="max-height:60vh; overflow-y:auto;">

                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Admission No</th>
                                    <th>Class</th>
                                    <th>Class Number</th>
                                    <th>Name</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentTable">
                                <!-- Student rows will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const QUERY_LIMIT = 20; // Change this value to adjust row limit

        function loadStudents() {
            const sql = `SELECT * FROM Students LIMIT ${QUERY_LIMIT}`;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => renderTable(data));
        }

        document.querySelectorAll('#studentForm input').forEach((input, index, inputs) => {
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); // Prevent form submission

                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        document.getElementById('studentForm').requestSubmit();
                    }
                }
            });
        });

        // Save student (insert or update)
        document.getElementById("studentForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const admission_no = document.getElementById("admission_no").value;
            const studentClass = document.getElementById("class").value;
            const name = document.getElementById("name").value;
            const classNumber = document.getElementById("class_number").value;

            const sql = `
                INSERT INTO Students (admission_no, class, class_number, student_name)
                VALUES (${admission_no}, '${studentClass}', ${classNumber}, '${name}')
                ON DUPLICATE KEY UPDATE class='${studentClass}', class_number=${classNumber}, student_name='${name}'
            `;

            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(() => loadStudents());

            this.reset();
            document.getElementById("admission_no").focus();
            playSound("success");

        });

        // Delete student
        function deleteStudent(id) {
            const sql = `DELETE FROM Students WHERE admission_no=${id}`;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(() => loadStudents());
            playSound("success");

        }

        // Search student (also limited)
        function searchStudent() {
            let query = document.getElementById("searchInput").value.trim();
            query = query.replace(/[-\s]+/g, "");

            const match = query.match(/^([A-Za-z0-9]+)(\d+)$/);
            if (match) {
                const className = match[1];
                const classNumber = match[2];
                const sql = `
                    SELECT * FROM Students
                    WHERE class='${className}' AND class_number=${classNumber}
                    LIMIT ${QUERY_LIMIT}
                `;
                fetch('/api/sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: sql })
                })
                    .then(res => res.json())
                    .then(data => renderTable(data));
                return;
            }

            const sql = `
                SELECT * FROM Students
                WHERE (admission_no LIKE '%${query}%') OR (student_name LIKE '%${query}%')
                LIMIT ${QUERY_LIMIT}
            `;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => renderTable(data));
        }

        // Render table
        function renderTable(students) {
            const tbody = document.getElementById("studentTable");
            tbody.innerHTML = "";
            students.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td>${s.admission_no}</td>
                        <td>${s.class}</td>
                        <td>${s.class_number}</td>
                        <td>${s.student_name}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-light" onclick="editStudent('${s.admission_no}')">Edit</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Edit student (prefill form)
        function editStudent(id) {
            const sql = `SELECT * FROM Students WHERE admission_no=${id} LIMIT 1`;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.length > 0) {
                        const s = data[0];
                        document.getElementById("admission_no").value = s.admission_no;
                        document.getElementById("class").value = s.class;
                        document.getElementById("class_number").value = s.class_number;
                        document.getElementById("name").value = s.student_name;
                    }
                });
        }

        // Initial load
        loadStudents();
    </script>

</body>

</html>
