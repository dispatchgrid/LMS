<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Books Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Library Management Dashboard</span>
            <div>
                <div id="navbarContent"></div>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">

            <!-- Left Side: Book Details -->
            <div class="col-md-4" style="min-height: 50%;">
                <div class="card bg-secondary text-light p-3">
                    <h4 class="mb-3">Add / Edit Book</h4>
                    <form id="bookForm">
                        <div class="mb-3">
                            <label for="book_no" class="form-label">Book Number</label>
                            <input type="number" id="book_no" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" id="title" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="author" class="form-label">Author</label>
                            <input type="text" id="author" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" id="category" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="availability" class="form-label">Availability (1 = Available, 0 =
                                Unavailable)</label>
                            <input type="number" id="availability" class="form-control" min="0" max="1" value="1">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save Book</button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Student Details -->
            <div class="col-md-8">
                <div class="card bg-secondary text-light p-3">
                    <h4 class="mb-3">Book Records</h4>
                    <div class="input-group mb-3">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by ID or Name">
                        <button class="btn btn-primary" onclick="searchBook()">Search</button>
                    </div>
                    <div style="max-height:60vh; overflow-y:auto;">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Book Nymber</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Category</th>
                                    <th>Availability</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bookTable">
                                <!-- Student rows will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script>
        const QUERY_LIMIT = 20; // Change this value to adjust row limit

        function loadBooks() {
            const sql = `SELECT book_no, title, author, category, availability 
                         FROM Books 
                         LIMIT ${QUERY_LIMIT}`;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => renderTable(data));
        }

        document.querySelectorAll('#bookForm input').forEach((input, index, inputs) => {
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); // Prevent form submission

                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        document.getElementById('bookForm').requestSubmit();
                    }
                }
            });
        });

        document.getElementById("bookForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const book_no = document.getElementById("book_no").value;
            const title = document.getElementById("title").value;
            const author = document.getElementById("author").value;
            const category = document.getElementById("category").value;
            const availability = document.getElementById("availability").value;

            const sql = `
            INSERT INTO Books (book_no, title, author, category, availability)
            VALUES (${book_no}, '${title}', '${author}', '${category}', ${availability})
            ON DUPLICATE KEY UPDATE title='${title}', author='${author}', category='${category}', availability=${availability}
            `;
            console.log(sql);
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(() => loadBooks());

            this.reset();
            playSound("success");

        });

        // Delete book
        function deleteBook(id) {
            const sql = `DELETE FROM Books WHERE book_no=${id}`;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(() => loadBooks());
            playSound("success");

        }

        // Search book (also limited)
        function searchBook() {
            const query = document.getElementById("searchInput").value.trim();

            if (!query) {
                // Optionally clear table or show all books
                loadBooks();
                return;
            }

            const sql = `SELECT book_no, title, author, category, availability
                 FROM Books
                 WHERE book_no='${query}' 
                    OR title LIKE '%${query}%' 
                    OR author LIKE '%${query}%' 
                    OR category LIKE '%${query}%'
                 LIMIT 20`;

            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => renderTable(data));

        }


        // Render table
        function renderTable(books) {
            const tbody = document.getElementById("bookTable");
            tbody.innerHTML = "";
            books.forEach(b => {
                tbody.innerHTML += `
                    <tr>
                        <td>${b.book_no}</td>
                        <td>${b.title || ''}</td>
                        <td>${b.author || ''}</td>
                        <td>${b.category || ''}</td>
                        <td>${b.availability == 1 ? 'Available' : 'Unavailable'}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-light" onclick="editBook('${b.book_no}')">Edit</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Edit book (prefill form)
        function editBook(id) {
            const sql = `SELECT * FROM Books WHERE book_no=${id} LIMIT 1`;
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.length > 0) {
                        const b = data[0];
                        document.getElementById("book_no").value = b.book_no;
                        document.getElementById("title").value = b.title;
                        document.getElementById("author").value = b.author;
                        document.getElementById("category").value = b.category;
                        document.getElementById("availability").value = b.availability;
                    }
                });
        }

        // Initial load
        loadBooks();
    </script>

</body>

</html>
