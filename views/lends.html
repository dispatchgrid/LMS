<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lends Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .borrowed-mode {
            background-color: #c85656 !important;
        }

        /* dark reddish */
        .lend-mode {
            background-color: #6fbd6f !important;
        }

        /* dark greenish */
    </style>
 <script src="/script.js" defer></script>
</head>


<body class="bg-dark text-light">
    <div class="floating-shapes" id="shapes"></div>


    <div class="container my-3">
        <div class="card bg-secondary text-light p-4" id="lendCard">
            <h3 class="mb-3">Lends Management</h3>
            <form id="lendForm">
                <div class="mb-3">
                    <label for="book_no" class="form-label">Book Number</label>
                    <input type="number" id="book_no" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="admission_no" class="form-label">Student Admission No</label>
                    <input type="number" id="admission_no" class="form-control">
                </div>

                <!-- Non-editable info fields -->
                <div class="mb-3">
                    <label class="form-label">Book Title</label>
                    <input type="text" id="book_title" class="form-control" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Author</label>
                    <input type="text" id="book_author" class="form-control" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" id="book_category" class="form-control" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text" id="student_name" class="form-control" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Class</label>
                    <input type="text" id="student_class" class="form-control" readonly>
                </div>

                <button type="submit" class="btn btn-dark w-100" id="actionBtn">Lend / Return</button>
            </form>
            <div id="message" class="mt-3 text-center"></div>
        </div>
    </div>

    <script>
        const bookNoInput = document.getElementById("book_no");
        const admissionInput = document.getElementById("admission_no");
        const studentNameField = document.getElementById("student_name");
        const studentClassField = document.getElementById("student_class");
        const bookTitleField = document.getElementById("book_title");
        const bookAuthorField = document.getElementById("book_author");
        const bookCategoryField = document.getElementById("book_category");
        const messageDiv = document.getElementById("message");
        const actionBtn = document.getElementById("actionBtn");
        const lendCard = document.getElementById("lendCard");

        let currentMode = null; // "borrowed" or "lend"

        // Step 1: Enter book number
        bookNoInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                const book_no = bookNoInput.value;
                const sql = `SELECT b.title, b.author, c.name AS category, b.availability, s.name, s.class
                     FROM Books b
                     LEFT JOIN Categories c ON b.category_id=c.category_id
                     LEFT JOIN Lends l ON b.book_no=${book_no} AND l.return_date IS NULL
                     LEFT JOIN Students s ON l.admission_no=s.admission_no
                     WHERE b.book_no=${book_no}`;
                fetch('/api/sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: sql })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.length > 0) {
                            const book = data[0];
                            bookTitleField.value = book.title || "";
                            bookAuthorField.value = book.author || "";
                            bookCategoryField.value = book.category || "";

                            if (book.availability == 0) {
                                // Book is borrowed
                                currentMode = "borrowed";
                                document.body.classList.add("borrowed-mode");
                                document.body.classList.remove("lend-mode");
                                studentNameField.value = book.name || "";
                                studentClassField.value = book.class || "";
                                messageDiv.innerHTML = `<span class="text-danger">Borrowed by ${book.name} (${book.class}). Press Enter to return.</span>`;
                                actionBtn.focus();
                            } else {
                                // Book is available
                                currentMode = "lend";
                                document.body.classList.add("lend-mode");
                                document.body.classList.remove("borrowed-mode");
                                studentNameField.value = "";
                                studentClassField.value = "";
                                messageDiv.innerHTML = "<span class='text-success'>Book is available. Enter student ID to lend.</span>";
                                admissionInput.focus();
                            }
                        } else {
                            messageDiv.innerHTML = "<span class='text-warning'>Book not found.</span>";
                        }
                    });
            }
        });

        // Step 2: Enter student number if lending
        admissionInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter" && currentMode === "lend") {
                e.preventDefault();
                const admission_no = admissionInput.value;

                // First check if student already has a borrowed book
                const checkSql = `SELECT COUNT(*) AS active FROM Lends WHERE admission_no=${admission_no} AND return_date IS NULL`;
                fetch('/api/sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: checkSql })
                })
                    .then(res => res.json())
                    .then(result => {
                        if (result[0].active > 0) {
                            messageDiv.innerHTML = "<span class='text-danger'>This student already has a borrowed book!</span>";
                        } else {
                            // Load student info
                            const sql = `SELECT * FROM Students WHERE admission_no=${admission_no}`;
                            fetch('/api/sql', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ query: sql })
                            })
                                .then(res => res.json())
                                .then(data => {
                                    if (data.length > 0) {
                                        const student = data[0];
                                        studentNameField.value = student.name;
                                        studentClassField.value = student.class;
                                        messageDiv.innerHTML = `<span class="text-info">Student: ${student.name} (${student.class}). Press Enter to lend.</span>`;
                                        actionBtn.focus();
                                    } else {
                                        messageDiv.innerHTML = "<span class='text-warning'>Student not found.</span>";
                                    }
                                });
                        }
                    });
            }
        });

        // Step 3: Action button (lend or return)
        document.getElementById("lendForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const book_no = bookNoInput.value;
            const admission_no = admissionInput.value;

            if (currentMode === "borrowed") {
                // Return sequence
                fetch('/api/sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: `UPDATE Lends SET return_date=CURDATE() WHERE book_no=${book_no} AND return_date IS NULL` })
                })
                    .then(() => {
                        return fetch('/api/sql', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ query: `UPDATE Books SET availability=1 WHERE book_no=${book_no}` })
                        });
                    })
                    .then(() => {
                        messageDiv.innerHTML = "<span class='text-success'>Book returned successfully!</span>";
                        resetForm();
                    });

            } else if (currentMode === "lend") {
                // Lend sequence
                fetch('/api/sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: `INSERT INTO Lends (book_no, admission_no, lend_date) VALUES (${book_no}, ${admission_no}, CURDATE())` })
                })
                    .then(() => {
                        return fetch('/api/sql', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ query: `UPDATE Books SET availability=0 WHERE book_no=${book_no}` })
                        });
                    })
                    .then(() => {
                        messageDiv.innerHTML = "<span class='text-success'>Book lent successfully!</span>";
                        resetForm();
                    });
            }
        });
        function resetForm() {
            bookNoInput.value = "";
            admissionInput.value = "";
            studentNameField.value = "";
            studentClassField.value = "";
            bookTitleField.value="";
            bookAuthorField.value="";
            bookCategoryField.value="";
            document.body.classList.remove("borrowed-mode", "lend-mode");
            currentMode = null;
            bookNoInput.focus();
        }

    </script>

</body>

</html>
