<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Library Login</title>
    <!-- Bootstrap Dark Theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="/script.js" defer></script>


</head>

<body class="bg-dark text-light d-flex align-items-center justify-content-center vh-100">
    <button class="btn btn-danger" id="quitBtn" style="position: absolute; top: 10px; right: 10px;">
        Quit
    </button>

    <div class="card bg-secondary text-light p-4" style="width: 350px; margin: 80px auto;">
        <h3 class="text-center mb-3">Library Management System</h3>
        <h5 class="text-center mb-3">Login</h5>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div id="message" class="mt-3 text-center"></div>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            const url = `/authenticate?user=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;

            fetch(url, { method: "GET" })
                .then(response => {
                    if (response.status === 200) {
                        document.getElementById("message").innerHTML =
                            "<span class='text-success'>Login successful!</span>";
                        playSound("toggle_on");
                        setTimeout(function () {
                            window.location.href = "/dashboard";

                        }, 500);
                    } else if (response.status === 401) {
                        document.getElementById("message").innerHTML =
                            "<span class='text-danger'>Invalid credentials</span>";
                        playSound("error");

                    } else if (response.status === 403) {
                        response.text().then(msg => {
                            document.getElementById("message").innerHTML =
                                "<span class='text-danger'>" + msg + "</span>";
                            playSound("error");

                        });
                    } else if (response.status === 500) {
                        response.text().then(msg => {
                            document.getElementById("message").innerHTML =
                                "<span class='text-danger'>" + msg + "</span>";
                            playSound("error");

                        });
                    } else {
                        document.getElementById("message").innerHTML =
                            "<span class='text-danger'>Unexpected error</span>";
                        playSound("error");

                    }
                })
                .catch(err => {
                    console.error("Error authenticating:", err);
                    alert("Internet connection lost or server unreachable.");
                    document.getElementById("message").innerHTML =
                        "<span class='text-danger'>Network error</span>";
                    playSound("error");

                });
        });

    </script>


</body>

</html>
