<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Library Login</title>
    <!-- Bootstrap Dark Theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

</head>

<body class="bg-dark text-light d-flex align-items-center justify-content-center vh-100">

    <div class="card bg-secondary text-light p-4" style="width: 350px;">
        <h3 class="text-center mb-3">Library Management System </h3>
        <h5 class="text-center mb-3">Login</h5>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>
        <div id="message" class="mt-3 text-center"></div>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            const url = `/authenticate?user=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;

            fetch(url, { method: "GET" })
                .then(response => {
                    if (response.status === 200) {
                        document.getElementById("message").innerHTML =
                            "<span class='text-success'>Login successful!</span>";
                        window.location.href = "/dashboard";
                    } else if (response.status === 401) {
                        document.getElementById("message").innerHTML =
                            "<span class='text-danger'>Invalid credentials</span>";
                    } else if (response.status === 403) {
                        response.text().then(msg => {
                            document.getElementById("message").innerHTML =
                                "<span class='text-danger'>" + msg + "</span>";
                        });
                    } else if (response.status === 500) {
                        response.text().then(msg => {
                            document.getElementById("message").innerHTML =
                                "<span class='text-danger'>" + msg + "</span>";
                        });
                    } else {
                        document.getElementById("message").innerHTML =
                            "<span class='text-danger'>Unexpected error</span>";
                    }
                })
                .catch(err => {
                    console.error("Error authenticating:", err);
                    alert("Internet connection lost or server unreachable.");
                    document.getElementById("message").innerHTML =
                        "<span class='text-danger'>Network error</span>";
                });
        });

    </script>


</body>

</html>
