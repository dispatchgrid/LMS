<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Voice Book Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="/script.js" defer></script>
    <style>
        #liveDictationBox {
            transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease, padding 0.3s ease;
            overflow: hidden;
        }
        #liveDictationBox.collapsed {
            max-height: 0 !important;
            opacity: 0;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        #liveDictationBox.expanded {
            max-height: 100px;
            opacity: 1;
        }
        #liveDictationLabel {
            transition: opacity 0.2s ease;
        }
        #liveDictationLabel.label-hidden {
            opacity: 0;
            height: 0;
            margin: 0;
            overflow: hidden;
        }
        #liveDictationLabel.label-visible {
            opacity: 1;
            height: auto;
        }
        .pulse-ring {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulseRing 1s ease-out infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes pulseRing {
            0% { box-shadow: 0 0 0 0 rgba(220,53,69,0.6); }
            100% { box-shadow: 0 0 0 12px rgba(220,53,69,0); }
        }
    </style>
</head>

<body class=" ">
    <nav class="navbar  " id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Library Management Dashboard</span>
            <div>
                <div id="navbarContent"></div>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">

            <!-- Left Side: Entry Form -->
            <div class="col-md-6">
                <div class="card   p-3">
                    <h4 class="mb-3">Add / Edit Book</h4>
                    <form id="bookEntryForm">
                        <div class="mb-3">
                            <label for="book_no" class="form-label">Book Number</label>
                            <input type="number" id="book_no" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="lang" class="form-label">Language (s = Sinhala, e = English)</label>
                            <input type="text" id="lang" class="form-control" maxlength="1" value="s">
                        </div>

                        <!-- Label with pulse dot — outside the overflow-hidden box -->
                        <div id="liveDictationLabel" class="form-label label-hidden">
                            <span class="pulse-ring"></span>Listening...
                        </div>

                        <!-- Transient live recognition input — overflow hidden for collapse animation -->
                        <div id="liveDictationBox" class="mb-3 collapsed">
                            <input type="text" id="liveDictation" class="form-control" readonly
                                   style="background:rgba(220,53,69,0.08); border-color:rgba(220,53,69,0.3);">
                        </div>

                        <div class="mb-3">
                            <label for="titleField" class="form-label">Title</label>
                            <input type="text" id="titleField" class="form-control" placeholder="Title" disabled>
                        </div>
                        <div class="mb-3">
                            <label for="authorField" class="form-label">Author</label>
                            <input type="text" id="authorField" class="form-control" placeholder="Author" disabled>
                        </div>

                        <div class="mb-3">
                            <label for="approveField" class="form-label">Approve? (1 = Yes, 0 = No)</label>
                            <input type="text" id="approveField" class="form-control" value="1" disabled
                                   style="max-width:120px;">
                        </div>

                        <button type="button" class="btn btn-primary w-100 mb-3" id="startBtn">Start
                            Recognition</button>

                        <div id="preview" class="mb-3"></div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" id="price" class="form-control" min="0">
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" id="category" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save Book</button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Recent Updates -->
            <div class="col-md-6">
                <div class="card   p-3">
                    <h4 class="mb-3">Recently Updated Books</h4>
                    <div style="max-height:400px; overflow-y:auto;">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Book No</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Price</th>
                                    <th>Category</th>
                                    <th>Updated</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="recentEntries">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>



    <script>
        let recognition;
        let recognizing = false;
        let approvedTitle = "";
        let approvedAuthor = "";
        let recognizedText = "";
        let currentLang = "s";

        const queryUrl = "/api/sql";
        const startBtn = document.getElementById("startBtn");
        const liveDictationBox = document.getElementById("liveDictationBox");
        const liveDictationLabel = document.getElementById("liveDictationLabel");
        const liveDictation = document.getElementById("liveDictation");
        const titleField = document.getElementById("titleField");
        const authorField = document.getElementById("authorField");
        const approveField = document.getElementById("approveField");
        const preview = document.getElementById("preview");

        if (!localStorage.getItem("updatedBooks")) {
            localStorage.setItem("updatedBooks", JSON.stringify([]));
        }

        // ---- Show / hide the transient listening UI ----
        function showListeningUI() {
            liveDictationLabel.classList.remove("label-hidden");
            liveDictationLabel.classList.add("label-visible");
            liveDictationBox.classList.remove("collapsed");
            liveDictationBox.classList.add("expanded");
        }
        function hideListeningUI() {
            liveDictationLabel.classList.remove("label-visible");
            liveDictationLabel.classList.add("label-hidden");
            liveDictationBox.classList.remove("expanded");
            liveDictationBox.classList.add("collapsed");
        }

        // ---- Field state helpers ----
        function lockFieldsForRecording() {
            titleField.value = "";
            authorField.value = "";
            titleField.disabled = true;
            authorField.disabled = true;
            approveField.disabled = true;
            approveField.value = "1";
            preview.textContent = "";
        }
        function unlockFieldsForApproval() {
            titleField.disabled = false;
            authorField.disabled = false;
            approveField.disabled = false;
            approveField.value = "1";
        }
        function lockFieldsAfterApproval() {
            titleField.disabled = true;
            authorField.disabled = true;
            approveField.disabled = true;
        }

        // ---- Manual navigation ----
        document.getElementById("book_no").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                const bookNo = document.getElementById("book_no").value.trim();
                if (!bookNo) return;

                const sqlCheck = `SELECT book_no,title FROM books WHERE book_no = '${bookNo}'`;

                fetch(queryUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: sqlCheck })
                })
                    .then(res => res.json())
                    .then(rows => {
                        if (!rows || rows.length === 0) {
                            showToast('danger', `The book number does not exist`);
                            playSound("error");
                            document.getElementById("book_no").value = "";
                            document.getElementById("book_no").focus();
                        } else {
                            preview.textContent = "";
                            if ((rows[0].title == null) || (rows[0].title == "")) {
                                document.getElementById("lang").focus();
                                document.getElementById("lang").select();
                            } else {
                                playSound("error");
                                const duplicateAllow = confirm("Skipping Due to Overwirting. Click Cancel to Overwrite");
                                if (duplicateAllow) {
                                    document.getElementById("book_no").value = "";
                                    document.getElementById("book_no").focus();
                                } else {
                                    document.getElementById("lang").focus();
                                    document.getElementById("lang").select();
                                }
                            }
                        }
                    })
                    .catch(err => {
                        preview.textContent = err.msg;
                    });
            }
        });

        document.getElementById("lang").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (document.getElementById("lang").value == "e" || document.getElementById("lang").value == "s") {
                    startBtn.focus();
                } else {
                    document.getElementById("lang").value = "s";
                    document.getElementById("lang").select();
                    playSound("error");
                }
            }
        });

        // Approve field: Enter to confirm
        approveField.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (approveField.value === "1") {
                    approvedTitle = titleField.value;
                    approvedAuthor = authorField.value;
                    lockFieldsAfterApproval();
                    document.getElementById("price").focus();
                } else {
                    retryEntry();
                }
            }
        });

        // Title field → author on Enter
        titleField.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                authorField.focus();
                authorField.select();
            }
        });

        // Author field → approve on Enter
        authorField.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (!approveField.disabled) {
                    approveField.focus();
                    approveField.select();
                }
            }
        });

        document.getElementById("price").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("category").focus();
                document.getElementById("category").select();
            }
        });

        document.getElementById("category").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("bookEntryForm").requestSubmit();
            }
        });

        document.body.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                resetForm();
            }
        });

        loadRecentEntries();
        document.getElementById("book_no").focus();

        // ---- Voice recognition setup ----
        if (window.SpeechRecognition || window.webkitSpeechRecognition) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let intertrim = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        recognizedText += event.results[i][0].transcript;
                    } else {
                        intertrim += event.results[i][0].transcript;
                    }
                }
                liveDictation.value = recognizedText + intertrim;
            };

            recognition.onerror = (event) => {
                preview.textContent = "Error: " + event.error;
                // On error, make sure UI resets so user can retry
                if (event.error === "aborted" || event.error === "no-speech") {
                    recognizing = false;
                    hideListeningUI();
                    startBtn.textContent = "Start Recognition";
                    startBtn.classList.remove("btn-danger");
                    startBtn.classList.add("btn-primary");
                }
            };

            recognition.onend = () => {
                // If we're still marked as recognizing, the end was unexpected
                // (e.g. silence timeout). Reset UI so user can restart.
                if (recognizing) {
                    recognizing = false;
                    hideListeningUI();
                    startBtn.textContent = "Start Recognition";
                    startBtn.classList.remove("btn-danger");
                    startBtn.classList.add("btn-primary");
                }
            };
        } else {
            showToast('danger', `Speech recognition not supported`);
        }

        // ---- Safe start that retries if recognition hasn't fully stopped yet ----
        function tryStartRecognition(langInput) {
            try {
                recognition.lang = (langInput === "e") ? "en-US" : "si-LK";
                recognition.start();
                onRecognitionStarted(langInput);
            } catch (e) {
                if (e.name === "InvalidStateError") {
                    setTimeout(() => tryStartRecognition(langInput), 200);
                } else {
                    throw e;
                }
            }
        }

        function onRecognitionStarted(langInput) {
            playSound("toggle_on");
            recognizing = true;
            recognizedText = "";
            liveDictation.value = "";

            showListeningUI();
            lockFieldsForRecording();

            startBtn.textContent = "Stop Recognition";
            startBtn.classList.remove("btn-primary");
            startBtn.classList.add("btn-danger");
        }

        // ---- Start / Stop button ----
        startBtn.addEventListener("click", () => {
            if (!recognition) return;

            currentLang = document.getElementById("lang").value.toLowerCase();

            if (!recognizing) {
                tryStartRecognition(currentLang);
            } else {
                recognition.stop();
                playSound("toggle_off");

                // Mark as not recognizing BEFORE onend fires,
                // so onend won't mistakenly reset the UI
                recognizing = false;

                hideListeningUI();

                startBtn.textContent = "Start Recognition";
                startBtn.classList.remove("btn-danger");
                startBtn.classList.add("btn-primary");

                processCapturedText(recognizedText, currentLang);
            }
        });

        // ---- Process captured text into title / author ----
        function processCapturedText(text, lang) {
            const trimmed = text.trim();


            let cleaned = trimmed.replace(/[.,\-]+/g, " ").replace(/\s+/g, " ").trim();
            let parts = cleaned.split(/ by | ලියන්නා /i);

            let title = parts[0].replace(/^book\s+/i, "").replace(/^පොත\s+/i, "").trim();
            let author = parts[1] ? parts[1].trim() : "";

            titleField.value = title;
            authorField.value = author;
            unlockFieldsForApproval();

            approveField.focus();
            approveField.select();
        }

        function retryEntry() {
            titleField.value = "";
            authorField.value = "";
            titleField.disabled = true;
            authorField.disabled = true;
            approveField.disabled = true;
            approveField.value = "1";
            recognizedText = "";
            liveDictation.value = "";
            preview.textContent = "";
            startBtn.focus();
        }

        // ---- localStorage helpers ----
        function addUpdatedBook(bookNo) {
            let updated = JSON.parse(localStorage.getItem("updatedBooks"));
            updated = updated.filter(b => b.bookNo !== bookNo);
            updated.push({ bookNo: bookNo, timestamp: Date.now() });
            localStorage.setItem("updatedBooks", JSON.stringify(updated));
        }

        function getSortedBookNumbers() {
            const updated = JSON.parse(localStorage.getItem("updatedBooks"));
            return updated
                .sort((a, b) => b.timestamp - a.timestamp)
                .map(b => b.bookNo);
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // ---- Save entry ----
        document.getElementById("bookEntryForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const bookNo = document.getElementById("book_no").value;
            const price = document.getElementById("price").value || 0;
            const category = document.getElementById("category").value.trim();

            const sqlUpdate = `
                UPDATE books
                SET title = '${approvedTitle}',
                    author = '${approvedAuthor}',
                    price = ${price},
                    category = '${category}'
                WHERE book_no = '${bookNo}';
            `;

            fetch(queryUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: sqlUpdate })
            })
                .then(res => res.text())
                .then(msg => {
                    console.log("DB updated:", msg);
                    playSound("success");
                    addUpdatedBook(bookNo);
                    loadRecentEntries();
                })
                .catch(err => {
                    showToast('danger', `Error ${err.message}`);
                });

            resetForm();
        });

        // ---- Recent entries table ----
        function loadRecentEntries() {
            const sortedBookNos = getSortedBookNumbers();

            if (sortedBookNos.length === 0) {
                document.getElementById("recentEntries").innerHTML = "<tr><td colspan='7'>No recent updates</td></tr>";
                return;
            }

            const updatedMap = {};
            JSON.parse(localStorage.getItem("updatedBooks")).forEach(b => {
                updatedMap[b.bookNo] = b.timestamp;
            });

            const sql = `SELECT book_no, title, author, price, category FROM books WHERE book_no IN (${sortedBookNos.map(b => `'${b}'`).join(",")})`;

            fetch(queryUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(rows => {
                    const tbody = document.getElementById("recentEntries");
                    tbody.innerHTML = "";
                    rows.sort((a, b) => (updatedMap[b.book_no] || 0) - (updatedMap[a.book_no] || 0));

                    rows.forEach(e => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${e.book_no}</td>
                            <td>${e.title || ""}</td>
                            <td>${e.author || ""}</td>
                            <td>${e.price || ""}</td>
                            <td>${e.category || ""}</td>
                            <td>${formatTimestamp(updatedMap[e.book_no])}</td>
                            <td><button class="btn btn-sm btn-danger" onclick="undoEntry('${e.book_no}')">Undo</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function undoEntry(bookNo) {
            const sql = `
                UPDATE books
                SET title = NULL,
                    author = NULL,
                    price = NULL,
                    category = NULL
                WHERE book_no = '${bookNo}';
            `;

            fetch(queryUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.text())
                .then(msg => {
                    console.log("DB cleared:", msg);
                    let updated = JSON.parse(localStorage.getItem("updatedBooks"));
                    updated = updated.filter(b => b.bookNo !== bookNo);
                    localStorage.setItem("updatedBooks", JSON.stringify(updated));
                    loadRecentEntries();
                })
                .catch(err => {
                    showToast('danger', `Error ${err.message}`);
                });
        }

        function resetForm() {
            document.getElementById("book_no").value = "";
            document.getElementById("price").value = "";
            titleField.value = "";
            authorField.value = "";
            titleField.disabled = true;
            authorField.disabled = true;
            approveField.disabled = true;
            approveField.value = "1";
            recognizedText = "";
            liveDictation.value = "";
            hideListeningUI();
            preview.textContent = "";
            document.getElementById("book_no").focus();
        }
    </script>
</body>

</html>
