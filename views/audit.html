<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Audit Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            background-color: #212529;
            color: #f8f9fa;
        }

        .card {
            background-color: #343a40;
            color: #f8f9fa;
        }

        table {
            color: #f8f9fa;
        }
    </style>
    <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Error</span>
            <div>

                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>

        </div>
    </nav>


    <div class="container my-4">
        <div class="card bg-secondary p-4">
            <h3 class="mb-3">Audit Scanning</h3>
            <form id="scanForm">
                <label for="book_no" class="form-label">Scan Book Barcode</label>
                <input type="number" id="book_no" class="form-control" autofocus>
            </form>
            <div id="message" class="mt-3 text-center"></div>
            <div id="recentScans" class="mt-4">
                <h5>Recent Scans</h5>
                <div style="max-height:40%; overflow-y:auto;">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Book No</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Category</th>
                                <th>Logged Time</th>
                            </tr>
                        </thead>
                        <tbody id="scanTable">
                            <!-- Scan rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bookInput = document.getElementById("book_no");
        const messageDiv = document.getElementById("message");
        const scanTable = document.getElementById("scanTable");

        // Handle barcode scan (Enter key)
        document.getElementById("scanForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const book_no = bookInput.value;

            const sqlInsert = `INSERT INTO Audit (book_no, check_date) VALUES (${book_no}, NOW())`;

            const sqlSelect = `SELECT b.book_no, b.title, b.author, b.category
                   FROM Books b
                   WHERE b.book_no=${book_no}`;


            // Insert audit record
            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sqlInsert })
            })
                .then(() => {
                    // Fetch book info
                    return fetch('/api/sql', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: sqlSelect })
                    });
                })
                .then(res => res.json())
                .then(data => {
                    if (data.length > 0) {
                        const book = data[0];
                        const now = new Date();
                        const loggedTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        messageDiv.innerHTML = `<span class="text-success">Book ${book_no} logged at ${loggedTime}</span>`;
                        playSound("success");
                        const row = document.createElement("tr");
                        row.innerHTML = `
            <td>${book.book_no}</td>
            <td>${book.title || ''}</td>
            <td>${book.author || ''}</td>
            <td>${book.category || ''}</td>
            <td>${loggedTime}</td>
          `;
                        scanTable.prepend(row);
                    } else {
                        messageDiv.innerHTML = "<span class='text-warning'>Book not found.</span>";
                        playSound("error");

                    }

                    bookInput.value = "";
                    bookInput.focus();
                });
        });
    </script>

</body>

</html>
