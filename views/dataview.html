<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Library Data View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Library Data View</span>
            <div>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card bg-secondary text-light p-4">
            <h3 class="mb-3">Library Data View & Statistics</h3>

            <!-- Search & Filters -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" id="searchInput" class="form-control"
                        placeholder="Search by Book No, Title, or Student Name">
                </div>
                <div class="col-md-3">
                    <select id="filter" class="form-select">
                        <option value="all">All Books</option>
                        <option value="available">Available Only</option>
                        <option value="unavailable">Unavailable Only</option>
                        <option value="overdue">Overdue Only</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="loadData()">Apply</button>
                </div>
            </div>

            <!-- Summary Statistics -->
            <div class="row mb-3" id="statsRow"></div>

            <!-- Data Table -->
            <table class="table table-striped" id="dataTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Book No ⬍</th>
                        <th onclick="sortTable(1)">Title ⬍</th>
                        <th onclick="sortTable(2)">Author ⬍</th>
                        <th onclick="sortTable(3)">Category ⬍</th>
                        <th onclick="sortTable(4)">Availability ⬍</th>
                        <th onclick="sortTable(5)">Borrower Name ⬍</th>
                        <th onclick="sortTable(6)">Class ⬍</th>
                        <th onclick="sortTable(7)">Lend Date ⬍</th>
                        <th onclick="sortTable(8)">Borrow Status ⬍</th>
                        <th onclick="sortTable(9)">Due Status ⬍</th>
                    </tr>
                </thead>
                <tbody id="dataBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function loadData() {
            const search = document.getElementById("searchInput").value;
            const filter = document.getElementById("filter").value;

            // SQL query: join Books + Lends + Students
            let sql = `
        SELECT 
          b.book_no,
          b.title,
          b.author,
          b.category,
          b.availability,
          s.name,
          s.class,
          l.lend_date,
          CASE 
            WHEN b.availability = 1 THEN 'Available'
            WHEN l.return_date IS NULL THEN 'Borrowed'
            ELSE 'Returned'
          END AS borrow_status,
          CASE 
            WHEN b.availability = 1 THEN '-' 
            WHEN l.return_date IS NULL AND DATEDIFF(CURDATE(), l.lend_date) > 7 THEN 'Overdue'
            WHEN l.return_date IS NULL THEN 'Within Due'
            ELSE '-'
          END AS due_status
        FROM Books b
        LEFT JOIN Lends l 
          ON b.book_no = l.book_no 
          AND l.lend_date = (
            SELECT MAX(l2.lend_date) 
            FROM Lends l2 
            WHERE l2.book_no = b.book_no
          )
        LEFT JOIN Students s ON l.admission_no = s.admission_no
      `;

            const conditions = [];

            if (filter === "available") {
                conditions.push("b.availability=1");
            } else if (filter === "unavailable") {
                conditions.push("b.availability=0");
            } else if (filter === "overdue") {
                conditions.push("b.availability=0 AND l.return_date IS NULL AND DATEDIFF(CURDATE(), l.lend_date) > 7");
            }

            if (search) {
                conditions.push(`(b.book_no LIKE '%${search}%' OR b.title LIKE '%${search}%' OR b.author LIKE '%${search}%' OR b.category LIKE '%${search}%' OR s.name LIKE '%${search}%')`);
            }

            if (conditions.length > 0) {
                sql += " WHERE " + conditions.join(" AND ");
            }

            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => {
                    renderTable(data);
                    renderStats(data);
                });
        }

        function renderTable(data) {
            const tbody = document.getElementById("dataBody");
            tbody.innerHTML = "";
            data.forEach(row => {
                tbody.innerHTML += `
      <tr>
        <td>${row.book_no}</td>
        <td>${row.title || "-"}</td>
        <td>${row.author || "-"}</td>
        <td>${row.category || "-"}</td>
        <td>${row.availability == 1 ? "Available" : "Unavailable"}</td>
        <td>${row.availability == 1 ? "-" : (row.name || "-")}</td>
        <td>${row.availability == 1 ? "-" : (row.class || "-")}</td>
        <td>${row.availability == 1 ? "-" : (formatDate(row.lend_date))}</td>
        <td>${row.borrow_status}</td>
        <td>${row.due_status}</td>
      </tr>
    `;
            });
        }

        function renderStats(data) {
            const totalBooks = data.length;
            const available = data.filter(r => r.availability == 1).length;
            const borrowed = data.filter(r => r.borrow_status === "Borrowed").length;
            const overdue = data.filter(r => r.due_status === "Overdue").length;

            const statsRow = document.getElementById("statsRow");
            statsRow.innerHTML = `
    <div class="col-md-3"><div class="card bg-light p-2 text-center">Total Books: ${totalBooks}</div></div>
    <div class="col-md-3"><div class="card bg-light p-2 text-center">Available: ${available}</div></div>
    <div class="col-md-3"><div class="card bg-light p-2 text-center">Borrowed: ${borrowed}</div></div>
    <div class="col-md-3"><div class="card bg-light p-2 text-center">Overdue: ${overdue}</div></div>
  `;
        }

        // Simple table sorting
        function sortTable(n) {
            const table = document.getElementById("dataTable");
            let switching = true, dir = "asc", switchcount = 0;
            while (switching) {
                switching = false;
                const rows = table.rows;
                for (let i = 1; i < (rows.length - 1); i++) {
                    let shouldSwitch = false;
                    let x = rows[i].getElementsByTagName("TD")[n];
                    let y = rows[i + 1].getElementsByTagName("TD")[n];
                    if (dir === "asc" && x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
                        shouldSwitch = true;
                        break;
                    } else if (dir === "desc" && x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) {
                        shouldSwitch = true;
                        break;
                    }
                }
                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                    switchcount++;
                } else {
                    if (switchcount === 0 && dir === "asc") {
                        dir = "desc";
                        switching = true;
                    }
                }
            }
        }

        // Initial load
        loadData();

        function formatDate(dateString) {
            if (!dateString || dateString === "-") return "-";
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }
    </script>
</body>
</html>
