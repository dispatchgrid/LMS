<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Library Data View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Library Data View</span>
            <div>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="card bg-secondary text-light p-4">
            <h3 class="mb-3">Borrow & Return Records</h3>

            <!-- Search & Filters -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" id="searchInput" class="form-control"
                        placeholder="Search by Book No, Title, or Student Name">
                </div>
                <div class="col-md-3">
                    <select id="filter" class="form-select">
                        <option value="all">All Records</option>
                        <option value="borrowed">Currently Borrowed</option>
                        <option value="returned">Returned</option>
                        <option value="overdue">Overdue</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="loadData()">Apply</button>
                </div>
            </div>

            <!-- Summary Statistics -->
            <div class="row mb-3" id="statsRow"></div>

            <!-- Data Table -->
            <div style="max-height:50vh; overflow-y:auto;">
                <table class="table table-striped table-hover" id="dataTable">
                    <thead class="table-dark">
                        <tr>
                            <th onclick="sortTable(0)">Book No ↕</th>
                            <th onclick="sortTable(1)">Title ↕</th>
                            <th onclick="sortTable(2)">Student Name ↕</th>
                            <th onclick="sortTable(3)">Class ↕</th>
                            <th onclick="sortTable(4)">Class No ↕</th>
                            <th onclick="sortTable(5)">Borrow Date ↕</th>
                            <th onclick="sortTable(6)">Return Date ↕</th>
                            <th onclick="sortTable(7)">Status ↕</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentSortCol = -1;
        let currentSortDir = "asc";

        function loadData() {
            const search = document.getElementById("searchInput").value;
            const filter = document.getElementById("filter").value;

            let sql = `
                SELECT 
                    l.id,
                    l.book_no,
                    b.title,
                    s.student_name,
                    s.class,
                    s.class_number,
                    l.lend_date,
                    l.return_date,
                    CASE 
                        WHEN l.return_date IS NOT NULL THEN 'Returned'
                        WHEN DATEDIFF(CURDATE(), l.lend_date) > 7 THEN 'Overdue'
                        ELSE 'Borrowed'
                    END AS status
                FROM Lends l
                JOIN Books b ON l.book_no = b.book_no
                JOIN Students s ON l.admission_no = s.admission_no
            `;

            const conditions = [];

            if (filter === "borrowed") {
                conditions.push("l.return_date IS NULL AND DATEDIFF(CURDATE(), l.lend_date) <= 7");
            } else if (filter === "returned") {
                conditions.push("l.return_date IS NOT NULL");
            } else if (filter === "overdue") {
                conditions.push("l.return_date IS NULL AND DATEDIFF(CURDATE(), l.lend_date) > 7");
            }

            if (search) {
                const normalized = search.replace(/[-\s]+/g, "");
                const match = normalized.match(/^([A-Za-z0-9]+)(\d+)$/);

                if (match) {
                    const className = match[1];
                    const classNumber = match[2];
                    conditions.push(`(s.class='${className}' AND s.class_number=${classNumber})`);
                } else {
                    conditions.push(`(
                        l.book_no LIKE '%${search}%' OR 
                        b.title LIKE '%${search}%' OR 
                        s.student_name LIKE '%${search}%'
                    )`);
                }
            }

            if (conditions.length > 0) {
                sql += " WHERE " + conditions.join(" AND ");
            }

            sql += " ORDER BY l.lend_date DESC";

            fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(data => {
                    renderTable(data);
                    renderStats(data);
                });
        }

        function renderTable(data) {
            const tbody = document.getElementById("dataBody");
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">No records found</td></tr>`;
                return;
            }

            data.forEach(row => {
                let statusBadge;
                if (row.status === 'Returned') {
                    statusBadge = '<span class="badge bg-success">Returned</span>';
                } else if (row.status === 'Overdue') {
                    statusBadge = '<span class="badge bg-danger">Overdue</span>';
                } else {
                    statusBadge = '<span class="badge bg-warning text-dark">Borrowed</span>';
                }

                tbody.innerHTML += `
                    <tr class="${row.status === 'Overdue' ? 'table-danger' : ''}">
                        <td>${row.book_no}</td>
                        <td>${row.title || "-"}</td>
                        <td>${row.student_name || "-"}</td>
                        <td>${row.class || "-"}</td>
                        <td>${row.class_number || "-"}</td>
                        <td>${formatDate(row.lend_date)}</td>
                        <td>${row.return_date ? formatDate(row.return_date) : '<span class="text-muted">-</span>'}</td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            });
        }

        function renderStats(data) {
            const total = data.length;
            const borrowed = data.filter(r => r.status === "Borrowed").length;
            const returned = data.filter(r => r.status === "Returned").length;
            const overdue = data.filter(r => r.status === "Overdue").length;

            const statsRow = document.getElementById("statsRow");
            statsRow.innerHTML = `
                <div class="col-md-3">
                    <div class="card bg-dark p-3 text-center border">
                        <h6 class="text-light mb-1">Total Records</h6>
                        <h3 class="text-light mb-0">${total}</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-dark p-3 text-center border border-warning">
                        <h6 class="text-warning mb-1">Currently Borrowed</h6>
                        <h3 class="text-warning mb-0">${borrowed}</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-dark p-3 text-center border border-success">
                        <h6 class="text-success mb-1">Returned</h6>
                        <h3 class="text-success mb-0">${returned}</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-dark p-3 text-center border border-danger">
                        <h6 class="text-danger mb-1">Overdue</h6>
                        <h3 class="text-danger mb-0">${overdue}</h3>
                    </div>
                </div>
            `;
        }

        // Fixed sorting function
        function sortTable(colIndex) {
            const table = document.getElementById("dataTable");
            const tbody = table.querySelector("tbody");
            const rows = Array.from(tbody.querySelectorAll("tr"));

            // Toggle direction if same column, otherwise reset to asc
            if (currentSortCol === colIndex) {
                currentSortDir = currentSortDir === "asc" ? "desc" : "asc";
            } else {
                currentSortCol = colIndex;
                currentSortDir = "asc";
            }

            rows.sort((a, b) => {
                const aCell = a.cells[colIndex];
                const bCell = b.cells[colIndex];

                // Use textContent to get plain text (ignores HTML badges)
                let aVal = aCell.textContent.trim();
                let bVal = bCell.textContent.trim();

                // Handle "-" as empty/lowest value
                if (aVal === "-") aVal = "";
                if (bVal === "-") bVal = "";

                // Try numeric comparison first (for Book No, Class No)
                const aNum = parseFloat(aVal);
                const bNum = parseFloat(bVal);
                if (!isNaN(aNum) && !isNaN(bNum)) {
                    return currentSortDir === "asc" ? aNum - bNum : bNum - aNum;
                }

                // Try date comparison (for date columns: index 5 and 6)
                if (colIndex === 5 || colIndex === 6) {
                    const aDate = new Date(aVal);
                    const bDate = new Date(bVal);
                    if (!isNaN(aDate.getTime()) && !isNaN(bDate.getTime())) {
                        return currentSortDir === "asc" ? aDate - bDate : bDate - aDate;
                    }
                }

                // Fallback to string comparison
                if (aVal < bVal) return currentSortDir === "asc" ? -1 : 1;
                if (aVal > bVal) return currentSortDir === "asc" ? 1 : -1;
                return 0;
            });

            // Re-append sorted rows
            rows.forEach(row => tbody.appendChild(row));

            // Update header arrows
            const headers = table.querySelectorAll("thead th");
            headers.forEach((th, i) => {
                const arrow = i === colIndex 
                    ? (currentSortDir === "asc" ? " ↑" : " ↓") 
                    : " ↕";
                th.textContent = th.textContent.replace(/ [↑↓↕]$/, "") + arrow;
            });
        }

        function formatDate(dateString) {
            if (!dateString) return "-";
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }

        // Initial load
        loadData();
    </script>

</body>

</html>
