<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Voice Book Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

    <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Library Management Dashboard</span>
            <div>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <div class="row">

            <!-- Left Side: Entry Form -->
            <div class="col-md-6">
                <div class="card bg-secondary text-light p-3">
                    <h4 class="mb-3">Add / Edit Book</h4>
                    <form id="bookEntryForm">
                        <div class="mb-3">
                            <label for="book_no" class="form-label">Book Number</label>
                            <input type="number" id="book_no" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="lang" class="form-label">Language (s = Sinhala, e = English)</label>
                            <input type="text" id="lang" class="form-control" maxlength="1" value="s">
                        </div>
                        <div class="mb-3">
                            <label for="dictation" class="form-label">Dictated Text</label>
                            <input type="text" id="dictation" class="form-control" readonly>
                        </div>
                        <button type="button" class="btn btn-primary w-100 mb-3" id="startBtn">Start
                            Recognition</button>
                        <div id="preview" class="mb-3"></div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" id="price" class="form-control" min="0">
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" id="category" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save Book</button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Recent Updates -->
            <div class="col-md-6">
                <div class="card bg-secondary text-light p-3">
                    <h4 class="mb-3">Recently Updated Books</h4>
                    <div style="max-height:400px; overflow-y:auto;">
                        <table class="table table-striped table-dark">
                            <thead>
                                <tr>
                                    <th>Book No</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Price</th>
                                    <th>Category</th>
                                    <th>Updated</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="recentEntries">
                                <!-- Rows inserted dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>



    <script>
        let recognition;
        let recognizing = false;
        let approvedTitle = "";
        let approvedAuthor = "";

        const queryUrl = "/api/sql";
        const startBtn = document.getElementById("startBtn");
        const dictationBox = document.getElementById("dictation");
        const preview = document.getElementById("preview");

        // Track updated book numbers with timestamps in localStorage
        if (!localStorage.getItem("updatedBooks")) {
            localStorage.setItem("updatedBooks", JSON.stringify([]));
        }

        // Manual navigation
        document.getElementById("book_no").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                const bookNo = document.getElementById("book_no").value.trim();

                if (!bookNo) return;

                const sqlCheck = `SELECT book_no,title FROM books WHERE book_no = '${bookNo}'`;

                fetch(queryUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: sqlCheck })
                })
                    .then(res => res.json())
                    .then(rows => {
                        if (!rows || rows.length === 0) {
                            preview.textContent = "The book number does not exist in the database";
                            document.getElementById("book_no").value = "";
                            document.getElementById("book_no").focus();
                        } else {
                            preview.textContent = "";
                            e.preventDefault();
                            if (rows[0].title != "") {
                                const duplicateAllow = confirm("You want to continue?");
                                if (!duplicateAllow) {
                                    document.getElementById("book_no").value = "";
                                    document.getElementById("book_no").focus();
                                } else {
                                    document.getElementById("lang").focus();
                                    document.getElementById("lang").select();
                                }
                            } else {
                                document.getElementById("lang").focus();
                                document.getElementById("lang").select();
                            }

                        }
                    })
                    .catch(err => {
                        preview.textContent = err.msg;
                    });
            }
        });

        document.getElementById("lang").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                startBtn.focus();
            }
        });
        document.getElementById("price").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("category").focus();
                document.getElementById("category").select();
            }
        });
        document.getElementById("category").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("bookEntryForm").requestSubmit();
            }
        });

        document.body.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                resetForm();
            }

        });

        loadRecentEntries();

        // Voice recognition setup
        if (window.SpeechRecognition || window.webkitSpeechRecognition) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {

                let transcript = "";
                let final = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript;
                    }
                }
                // Prepend saved text from previous sessions

                dictationBox.value = dictationBox.value + final;
            };

            recognition.onerror = (event) => {
                preview.textContent = "Error: " + event.error;
            };
        } else {
            preview.textContent = "Speech Recognition not supported in this browser.";
        }

        startBtn.addEventListener("click", () => {
            if (!recognition) return;
            const langInput = document.getElementById("lang").value.toLowerCase();
            recognition.lang = (langInput === "e") ? "en-US" : "si-LK";

            if (!recognizing) {
                // Save existing text before starting new session
                recognition.start();
                recognizing = true;
                startBtn.textContent = "Stop Recognition";
                startBtn.classList.remove("btn-primary");
                startBtn.classList.add("btn-danger");
            } else {
                recognition.stop();
                recognizing = false;
                startBtn.textContent = "Start Recognition";
                startBtn.classList.remove("btn-danger");
                startBtn.classList.add("btn-primary");
                // Save the final text after stopping
                processCapturedText(dictationBox.value, langInput);
            }
        });

        function processCapturedText(text, lang) {
            //const trimmed = text.trim();
            const trimmed = "Oliver Twist by Charles DIckes"
            let valid = false;
            /*if (lang === "e") {
                valid = /book/i.test(trimmed) && !/^book$/i.test(trimmed);
            } else {
                valid = /පොත/.test(trimmed) && trimmed !== "පොත";
            }*/
            if (trimmed != "") {
                valid = true;
            }


            if (!valid) {
                preview.textContent = "Invalid format. Must include keyword with actual content. Retry.";
                startBtn.focus();
                return;
            }

            let cleaned = trimmed.replace(/[.,\-]+/g, " ").replace(/\s+/g, " ").trim();
            let parts = cleaned.split(/ by | ලියන්නා /i);

            let title = parts[0].replace(/^book\s+/i, "").replace(/^පොත\s+/i, "").trim();
            let author = parts[1] ? parts[1].trim() : "";

            preview.innerHTML = `
  <strong>Preview:</strong><br>
  <div class="d-flex align-items-center mb-2">
    <input type="text" id="titleApproveField" value="${title}" class="form-control form-control-sm w-25 me-2">
    
    <span class="mx-2">by</span>
    
    <input type="text" id="authorApproveField" value="${author || ""}" class="form-control form-control-sm w-25">
  </div>
  
  <label>Approve? (1=Yes, 0=No):</label>
  <input type="text" id="approveField" value="1" class="form-control form-control-sm w-25">
`;


            const approveField = document.getElementById("approveField");
            approveField.focus();
            approveField.select();
            approveField.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    title = document.getElementById("titleApproveField").value;
                    author = document.getElementById("authorApproveField").value;

                    e.preventDefault();
                    if (approveField.value === "1") {
                        approveEntry(title, author, lang);
                    } else {
                        retryEntry();
                    }
                }
            });
        }

        function approveEntry(title, author, lang) {
            approvedTitle = title;
            approvedAuthor = author;
            const authorSeperator = (lang === "s") ? "ලියන්නා" : "by";
            preview.textContent = `Approved: ${title} by ${author || "-"}`;
            document.getElementById("price").focus();
        }

        function retryEntry() {
            dictationBox.value = "";
            preview.textContent = "Please retry voice capture.";
            startBtn.focus();
        }

        // Helper function to add/update book entry with timestamp
        function addUpdatedBook(bookNo) {
            let updated = JSON.parse(localStorage.getItem("updatedBooks"));
            updated = updated.filter(b => b.bookNo !== bookNo);
            updated.push({
                bookNo: bookNo,
                timestamp: Date.now()
            });
            localStorage.setItem("updatedBooks", JSON.stringify(updated));
        }

        // Helper function to get sorted book numbers (newest first)
        function getSortedBookNumbers() {
            const updated = JSON.parse(localStorage.getItem("updatedBooks"));
            return updated
                .sort((a, b) => b.timestamp - a.timestamp)
                .map(b => b.bookNo);
        }

        // Helper function to format timestamp
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Approve/save entry
        document.getElementById("bookEntryForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const bookNo = document.getElementById("book_no").value;
            const price = document.getElementById("price").value || 0;
            const category = document.getElementById("category").value.trim();

            const sqlUpdate = `
                UPDATE books
                SET title = '${approvedTitle}',
                    author = '${approvedAuthor}',
                    price = ${price},
                    category = '${category}'
                WHERE book_no = '${bookNo}';
            `;

            fetch(queryUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: sqlUpdate })
            })
                .then(res => res.text())
                .then(msg => {
                    console.log("DB updated:", msg);
                    addUpdatedBook(bookNo);
                    loadRecentEntries();
                })
                .catch(err => {
                    preview.textContent = "Error updating DB: " + err.message;
                });

            // Reset form except category
            resetForm();

        });

        function loadRecentEntries() {
            const sortedBookNos = getSortedBookNumbers();

            if (sortedBookNos.length === 0) {
                document.getElementById("recentEntries").innerHTML = "<tr><td colspan='7'>No recent updates</td></tr>";
                return;
            }

            const updatedMap = {};
            JSON.parse(localStorage.getItem("updatedBooks")).forEach(b => {
                updatedMap[b.bookNo] = b.timestamp;
            });

            const sql = `SELECT book_no, title, author, price, category FROM books WHERE book_no IN (${sortedBookNos.map(b => `'${b}'`).join(",")})`;

            fetch(queryUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.json())
                .then(rows => {
                    const tbody = document.getElementById("recentEntries");
                    tbody.innerHTML = "";
                    rows.sort((a, b) => (updatedMap[b.book_no] || 0) - (updatedMap[a.book_no] || 0));

                    rows.forEach(e => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${e.book_no}</td>
                            <td>${e.title || ""}</td>
                            <td>${e.author || ""}</td>
                            <td>${e.price || ""}</td>
                            <td>${e.category || ""}</td>
                            <td>${formatTimestamp(updatedMap[e.book_no])}</td>
                            <td><button class="btn btn-sm btn-danger" onclick="undoEntry('${e.book_no}')">Undo</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function undoEntry(bookNo) {
            const sql = `
                UPDATE books
                SET title = NULL,
                    author = NULL,
                    price = NULL,
                    category = NULL
                WHERE book_no = '${bookNo}';
            `;

            fetch(queryUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: sql })
            })
                .then(res => res.text())
                .then(msg => {
                    console.log("DB cleared:", msg);
                    let updated = JSON.parse(localStorage.getItem("updatedBooks"));
                    updated = updated.filter(b => b.bookNo !== bookNo);
                    localStorage.setItem("updatedBooks", JSON.stringify(updated));
                    loadRecentEntries();
                })
                .catch(err => {
                    preview.textContent = "Error clearing DB: " + err.message;
                });
        }

        function resetForm() {
            document.getElementById("book_no").value = "";
            document.getElementById("price").value = "";
            dictationBox.value = "";
            preview.textContent = "";
            document.getElementById("book_no").focus();
        }
    </script>
</body>

</html>
