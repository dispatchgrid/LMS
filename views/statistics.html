<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Statistics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <script src="/script.js" defer></script>
</head>

<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-secondary" id="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbarTxt">Error</span>
            <div>
   
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>

        </div>
    </nav>


  <div class="container my-5">
    <div class="card bg-secondary text-light p-4">
      <h3 class="mb-3">Library Statistics</h3>

      <!-- Date Range Options -->
      <div class="row mb-3">
        <div class="col-md-2"><button class="btn btn-dark w-100" onclick="setRange('day')">Last Day</button></div>
        <div class="col-md-2"><button class="btn btn-dark w-100" onclick="setRange('week')">Last Week</button></div>
        <div class="col-md-2"><button class="btn btn-dark w-100" onclick="setRange('month')">Last Month</button></div>
        <div class="col-md-2"><button class="btn btn-dark w-100" onclick="setRange('year')">Last Year</button></div>
        <div class="col-md-4 d-flex gap-2">
          <input type="date" id="fromDate" class="form-control">
          <input type="date" id="toDate" class="form-control">
          <button class="btn btn-light" onclick="viewStats()">Custom</button>
        </div>
      </div>

      <!-- Statistics Display -->
      <div id="stats" class="mt-4"></div>

      <!-- Charts -->
      <div class="mt-4">
        <h5>Borrowing Frequency</h5>
        <canvas id="frequencyChart"></canvas>
      </div>
      <div class="mt-4">
        <h5>Top 10 Borrowed Books</h5>
        <canvas id="booksChart"></canvas>
      </div>
      <div class="mt-4">
        <h5>Top 10 Borrowing Students</h5>
        <canvas id="studentsChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    let frequencyChart, booksChart, studentsChart;

    function setRange(type) {
      const today = new Date();
      let fromDate = new Date();
      if (type === 'day') fromDate.setDate(today.getDate() - 1);
      if (type === 'week') fromDate.setDate(today.getDate() - 7);
      if (type === 'month') fromDate.setMonth(today.getMonth() - 1);
      if (type === 'year') fromDate.setFullYear(today.getFullYear() - 1);

      document.getElementById("fromDate").value = fromDate.toISOString().split('T')[0];
      document.getElementById("toDate").value = today.toISOString().split('T')[0];
      viewStats(type);
    }

    function viewStats(rangeType="custom") {
      const fromDate = document.getElementById("fromDate").value;
      const toDate = document.getElementById("toDate").value;

      // Stats queries
      const queries = {
        availableBooks: `SELECT COUNT(*) AS available FROM Books WHERE availability=1`,
        notReturned: `SELECT COUNT(*) AS notReturned FROM Lends WHERE return_date IS NULL`,
        overdue: `SELECT COUNT(*) AS overdue FROM Lends WHERE return_date IS NULL AND DATEDIFF(CURDATE(), lend_date) > 14`,
        underdue: `SELECT COUNT(*) AS underdue FROM Lends WHERE return_date IS NULL AND DATEDIFF(CURDATE(), lend_date) <= 14`,
        totalBorrows: `SELECT COUNT(*) AS borrows FROM Lends WHERE lend_date BETWEEN '${fromDate}' AND '${toDate}'`,
        activeStudents: `SELECT COUNT(DISTINCT admission_no) AS active FROM Lends WHERE lend_date BETWEEN '${fromDate}' AND '${toDate}'`,
        totalStudents: `SELECT COUNT(*) AS total FROM Students`,
        borrowedOnce: `SELECT COUNT(DISTINCT book_no) AS borrowedOnce FROM Lends`,
        totalBooks: `SELECT COUNT(*) AS total FROM Books`
      };

      Promise.all(Object.entries(queries).map(([key, sql]) =>
        fetch('/api/sql', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: sql })
        }).then(res => res.json()).then(data => ({ key, data }))
      ))
      .then(results => {
        const stats = {};
        results.forEach(r => stats[r.key] = r.data[0]);

        const activePct = ((stats.activeStudents.active / stats.totalStudents.total) * 100).toFixed(2);
        const borrowedPct = ((stats.borrowedOnce.borrowedOnce / stats.totalBooks.total) * 100).toFixed(2);

        document.getElementById("stats").innerHTML = `
          <div class="card bg-dark p-3">
            <p><strong>Available Books:</strong> ${stats.availableBooks.available}</p>
            <p><strong>Not Returned:</strong> ${stats.notReturned.notReturned}</p>
            <p><strong>Overdue:</strong> ${stats.overdue.overdue}</p>
            <p><strong>Underdue:</strong> ${stats.underdue.underdue}</p>
            <p><strong>Total Borrows (range):</strong> ${stats.totalBorrows.borrows}</p>
            <p><strong>Active Students:</strong> ${stats.activeStudents.active} (${activePct}% of total)</p>
            <p><strong>Books Borrowed At Least Once:</strong> ${stats.borrowedOnce.borrowedOnce} (${borrowedPct}% of total)</p>
          </div>
        `;
      });

      // Frequency chart query (group by hour/day/week depending on rangeType)
      let groupExpr = "DATE(lend_date)";
      if (rangeType === "day") groupExpr = "HOUR(lend_date)";
      if (rangeType === "week") groupExpr = "DATE(lend_date)";
      if (rangeType === "month") groupExpr = "DATE(lend_date)";
      if (rangeType === "year") groupExpr = "MONTH(lend_date)";

      const freqSql = `SELECT ${groupExpr} AS period, COUNT(*) AS cnt 
                       FROM Lends 
                       WHERE lend_date BETWEEN '${fromDate}' AND '${toDate}' 
                       GROUP BY period ORDER BY period`;

      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: freqSql })
      })
      .then(res => res.json())
      .then(data => {
        const labels = data.map(d => d.period);
        const counts = data.map(d => d.cnt);
        if (frequencyChart) frequencyChart.destroy();
        frequencyChart = new Chart(document.getElementById("frequencyChart"), {
          type: 'line',
          data: { labels, datasets: [{ label: 'Borrows', data: counts, borderColor: 'lightblue', fill: false }] }
        });
      });

      // Top 10 books
      const booksSql = `SELECT b.title, COUNT(*) AS cnt 
                        FROM Lends l JOIN Books b ON l.book_no=b.book_no 
                        WHERE l.lend_date BETWEEN '${fromDate}' AND '${toDate}' 
                        GROUP BY b.book_no ORDER BY cnt DESC LIMIT 10`;

      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: booksSql })
      })
      .then(res => res.json())
      .then(data => {
        const labels = data.map(d => d.title);
        const counts = data.map(d => d.cnt);
        if (booksChart) booksChart.destroy();
        booksChart = new Chart(document.getElementById("booksChart"), {
          type: 'bar',
          data: { labels, datasets: [{ label: 'Borrows', data: counts, backgroundColor: 'orange' }] }
        });
      });

      // Top 10 students
      const studentsSql = `SELECT s.name, COUNT(*) AS cnt 
                           FROM Lends l JOIN Students s ON l.admission_no=s.admission_no 
                           WHERE l.lend_date BETWEEN '${fromDate}' AND '${toDate}' 
                           GROUP BY s.admission_no ORDER BY cnt DESC LIMIT 10`;

      fetch('/api/sql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: studentsSql })
      })
      .then(res => res.json())
      .then(data => {
        const labels = data.map(d => d.name);
        const counts = data.map(d => d.cnt);
        if (studentsChart) studentsChart.destroy();
        studentsChart = new Chart(document.getElementById("studentsChart"), {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Borrows',
              data: counts,
              backgroundColor: 'lightgreen'
            }]
          },
          options: {
            indexAxis: 'y', // horizontal bar chart for readability
            scales: {
              x: { beginAtZero: true }
            }
          }
        });
      });
    }
  </script>

</body>
</html>
